<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>حاسبة بسيطة | Simple Calculator</title> 
    <link rel="stylesheet" href="./style.css">

</head>
<body>
<div class="calculator">
   
    <div class="display">
        <div class="previous-operand" id="previousDisplay"></div>
        <div class="current-operand" id="currentDisplay">0</div>
    </div>

    <div class="buttons">
        <button class="clear" id="clearBtn">AC</button>
        <button class="delete" id="deleteBtn">⌫</button>
        <button class="operator" id="percentBtn">%</button>
        <button class="operator" id="divideBtn">÷</button>

        <button id="btn7">7</button>
        <button id="btn8">8</button>
        <button id="btn9">9</button>
        <button class="operator" id="multiplyBtn">×</button>

        <button id="btn4">4</button>
        <button id="btn5">5</button>
        <button id="btn6">6</button>
        <button class="operator" id="subtractBtn">-</button>

        <button id="btn1">1</button>
        <button id="btn2">2</button>
        <button id="btn3">3</button>
        <button class="operator" id="addBtn">+</button>

        <button id="btn0" class="zero">0</button>
        <button id="dotBtn">.</button>
        <button class="equals" id="equalsBtn">=</button>
    </div>
</div>

<script src="./main.js"></script>
</body>
</html>
